# =============================================================================
# PPlaner Backend — application.properties
#
# Secrets MUST be provided via environment variables.
# Never hardcode credentials here.
# =============================================================================

# Server
server.port=${PORT:8080}
# TODO(security): In production, bind only to localhost behind a reverse proxy.
# server.address=127.0.0.1

spring.application.name=pplaner-backend

# ── Google OAuth2 ──────────────────────────────────────────────────────────
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET as environment variables.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar.events
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/auth/callback
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# ── Session ────────────────────────────────────────────────────────────────
# TODO(security): Replace in-memory store with Redis for production deployments
# to persist sessions across restarts and multiple instances.
spring.session.store-type=none
server.servlet.session.timeout=7d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.name=__Secure-pplaner-session

# ── CORS ───────────────────────────────────────────────────────────────────
# Update this to your actual Vercel deployment URL for production.
pplaner.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:4321}

# ── Logging ────────────────────────────────────────────────────────────────
# Do NOT log credentials or tokens.
logging.level.root=WARN
logging.level.com.pplaner=INFO
logging.level.org.springframework.security=WARN

# ── Actuator (disable for security) ───────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
